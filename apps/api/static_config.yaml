components_manager:
    coro_pool:
        initial_size: 500
        max_size: 1000
    default_task_processor: main-task-processor
    event_thread_pool:
        threads: 2
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
    components:
        server:
            listener:
                port: 8080
                task_processor: main-task-processor
        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
        dynamic-config:
            fs-cache-path: ''

        postgres-db:
            dbconnection#env: DATABASE_URL
            blocking_task_processor: fs-task-processor
            dns_resolver: async
            max_replication_lag: 60s
            persistent-prepared-statements: true

        testsuite-support: {}

        secdist: {}
        default-secdist-provider:
            config: /etc/tracker/secdist.json
            missing-ok: true
            environment-secrets-key: SECDIST_CONFIG

        redis-sentinel:
            groups:
              - config_name: tracker-sessions
                db: tracker-sessions
                sharding_strategy: RedisStandalone
            subscribe_groups: []
            thread_pools:
                redis_thread_pool_size: 2
                sentinel_thread_pool_size: 1

        dns-client:
            fs-task-processor: fs-task-processor

        auth-handler:
            path: /api/auth/{action}
            task_processor: main-task-processor
            method: GET,POST,PATCH,DELETE

        patient-handler:
            path: /api/patients
            task_processor: main-task-processor
            method: GET,POST

        patient-by-id-handler:
            path: /api/patients/{id}
            task_processor: main-task-processor
            method: GET,PATCH,DELETE

        session-store: {}

        patient-anamnesis-handler:
            path: /api/patients/{patient_id}/anamnesis
            task_processor: main-task-processor
            method: GET,POST

        anamnesis-by-id-handler:
            path: /api/anamnesis/{id}
            task_processor: main-task-processor
            method: GET,PATCH,DELETE

        patient-water-handler:
            path: /api/patients/{patient_id}/water
            task_processor: main-task-processor
            method: GET,POST

        water-by-id-handler:
            path: /api/water/{id}
            task_processor: main-task-processor
            method: GET,DELETE

        water-frequency-handler:
            path: /api/patients/{patient_id}/water-frequency
            task_processor: main-task-processor
            method: GET,PUT,DELETE
