components_manager:
    coro_pool:
        initial_size: 500
        max_size: 1000
    default_task_processor: main-task-processor
    event_thread_pool:
        threads: 2
    task_processors:
        main-task-processor:
            thread_pool_size: 4
        fs-task-processor:
            thread_pool_size: 2
    components:
        server:
            listener:
                port: $env{API_PORT}
                task_processor: main-task-processor
        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
        tracer:
            service-name: tracker-api
        dynamic-config:
            fs-cache-path: ''
            fallback-path: dynamic_config_vars.yaml
        dynamic-config-client-updater:
            enabled: false

        postgres-db:
            dbconnection: $env{DATABASE_URL}
            blocking_task_processor: fs-task-processor
            dns_resolver: async
            max_replication_lag: 60s
            persistent-prepared-statements: true

        redis-sentinel:
            sentinels:
                - { host: $env{REDIS_HOST}, port: $env{REDIS_PORT} }
            password: $env{REDIS_PASSWORD}

        auth-handler:
            path: /api/auth/{action}
            task_processor: main-task-processor
            method: GET,POST,PATCH,DELETE

        patient-handler:
            path: /api/patients
            task_processor: main-task-processor
            method: GET,POST

        patient-by-id-handler:
            path: /api/patients/{id}
            task_processor: main-task-processor
            method: GET,PATCH,DELETE

        anamnesis-handler:
            path: /api/anamnesis
            task_processor: main-task-processor
            method: GET,POST

        anamnesis-by-id-handler:
            path: /api/anamnesis/{id}
            task_processor: main-task-processor
            method: GET,PATCH,DELETE

        water-handler:
            path: /api/water
            task_processor: main-task-processor
            method: GET,POST

        water-by-id-handler:
            path: /api/water/{id}
            task_processor: main-task-processor
            method: GET,DELETE

        testsuite-support: {}
        http-client:
            fs-task-processor: fs-task-processor
